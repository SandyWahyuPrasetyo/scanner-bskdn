<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scanner Kehadiran BSKDN</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:20px;
text-align:center;
background:#f4f7fa;
}

h1{
color:#003366;
font-size:28px;
}

#reader{
width:100%;
margin:auto;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
box-sizing:border-box;
font-size:16px;
}

button{
background:#0066cc;
color:white;
border:none;
cursor:pointer;
border-radius:8px;
}

#hasil{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style>
</head>
<body>

<h1>Scanner Kehadiran BSKDN</h1>

<div id="reader"></div>

<input type="file" accept="image/*" id="file">

<input type="text" id="manual" placeholder="Input ID / Nama / QR">

<button onclick="manualCheckin()">CHECK-IN MANUAL</button>

<div id="hasil"></div>

<!-- FORM HIDDEN POST KE APPS SCRIPT -->
<form id="kirimForm"
method="POST"
target="hiddenFrame"
action="https://script.google.com/macros/s/AKfycbwWCZVBj5WU4mxBhRM0QYvtqUrTJbhUEwruKeYEBswjnTzuPrkil_MUN8pcy3gP-FcRgQ/exec">

<input type="hidden" name="kode" id="kodeField">

</form>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<script>

function bunyi(){
const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
audio.play();
}

function tampil(msg,sukses=false){
const h=document.getElementById("hasil");
h.innerHTML=msg;
h.style.color=sukses ? "green":"red";
if(sukses) bunyi();
}

function kirimKode(kode){

document.getElementById("kodeField").value = kode;
document.getElementById("kirimForm").submit();

tampil("⏳ Diproses...",true);

setTimeout(function(){
tampil("✅ Check-in berhasil",true);
},1200);

setTimeout(function(){
tampil("");
},4000);

document.getElementById("manual").value="";
document.getElementById("manual").focus();

}

function manualCheckin(){
const kode=document.getElementById("manual").value.trim();

if(kode!=""){
kirimKode(kode);
}
}

function onScanSuccess(decodedText){
kirimKode(decodedText);
}

new Html5QrcodeScanner(
"reader",
{fps:10,qrbox:250}
).render(onScanSuccess);

document.getElementById("file").addEventListener("change",function(e){

const file=e.target.files[0];
if(!file) return;

Html5Qrcode.scanFile(file,true)
.then(decodedText=>{
kirimKode(decodedText);
})
.catch(()=>{
tampil("❌ QR gambar gagal dibaca");
});

});
</script>

</body>
</html>
