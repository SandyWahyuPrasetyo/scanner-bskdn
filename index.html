<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scanner Kehadiran BSKDN</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:20px;
text-align:center;
background:#f4f7fa;
}

h1{
color:#003366;
font-size:28px;
}

#reader{
width:100%;
margin:auto;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
box-sizing:border-box;
font-size:16px;
}

button{
background:#0066cc;
color:white;
border:none;
cursor:pointer;
border-radius:8px;
}

button:disabled{
background:#999;
cursor:not-allowed;
}

#hasil{
margin-top:20px;
font-size:22px;
font-weight:bold;
min-height:40px;
}
</style>
</head>
<body>

<h1>Scanner Kehadiran BSKDN</h1>

<div id="reader"></div>

<input type="file" accept="image/*" id="file">

<input type="text" id="manual" placeholder="Input ID Peserta">

<button id="btnManual" onclick="manualCheckin()">CHECK-IN MANUAL</button>

<div id="hasil"></div>

<form id="kirimForm"
method="POST"
target="hiddenFrame"
action="https://script.google.com/macros/s/AKfycbxIwplhxtw_a0rq89s__PxdFSCIVQBEfHvR4amXyTTvY9-XEJmpc-pcJeALOGk_FzeKNg/exec">

<input type="hidden" name="kode" id="kodeField">

</form>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<script>

let sedangProses = false;
let lastScan = "";

function bunyi(){
new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

function tampil(msg,sukses=false){
const h=document.getElementById("hasil");
h.innerHTML=msg;
h.style.color=sukses ? "green" : "red";
if(sukses) bunyi();
}

function resetStatus(){
setTimeout(()=>{
tampil("");
sedangProses=false;
},3000);
}

async function kirimKode(kode){

if(!kode) return;

tampil("⏳ Diproses...", true);

try{

const url = "https://script.google.com/macros/s/AKfycbxIwplhxtw_a0rq89s__PxdFSCIVQBEfHvR4amXyTTvY9-XEJmpc-pcJeALOGk_FzeKNg/exec";

const formData = new FormData();
formData.append("kode", kode);

const res = await fetch(url,{
method:"POST",
body:formData
});

const text = await res.text();

if(text.includes("✅") || text.includes("⚠️")){
tampil(text,true);
}else{
tampil(text,false);
}

}catch(err){

tampil("❌ Koneksi gagal",false);

}

document.getElementById("manual").value="";

}

function manualCheckin(){
const kode = document.getElementById("manual").value;
kirimKode(kode);
}

function onScanSuccess(decodedText){
kirimKode(decodedText);
}

new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250
}
).render(onScanSuccess);

document.getElementById("file").addEventListener("change",function(e){

const file = e.target.files[0];
if(!file) return;

Html5Qrcode.scanFile(file,true)
.then(decodedText=>{
kirimKode(decodedText);
})
.catch(()=>{
tampil("❌ QR gambar gagal dibaca");
resetStatus();
});

this.value="";

});

</script>

</body>
</html>
