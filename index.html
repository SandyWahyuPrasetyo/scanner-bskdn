<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scanner Kehadiran BSKDN</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Arial,sans-serif;
max-width:720px;
margin:auto;
padding:20px;
background:#f4f7fa;
text-align:center;
}

h1{
color:#003366;
margin-bottom:20px;
}

#reader{
width:100%;
margin:auto;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
box-sizing:border-box;
border-radius:8px;
}

input{
border:1px solid #ccc;
}

button{
border:none;
background:#0066cc;
color:white;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:#999;
cursor:not-allowed;
}

#hasil{
margin-top:18px;
font-size:22px;
font-weight:bold;
min-height:40px;
}

.small{
font-size:13px;
color:#666;
margin-top:8px;
}
</style>
</head>
<body>

<h1>Scanner Kehadiran BSKDN</h1>

<div id="reader"></div>

<input type="file" id="file" accept="image/*">

<input type="text" id="manual" placeholder="Input ID Peserta / QR">

<button id="btnManual" onclick="manualCheckin()">CHECK-IN MANUAL</button>

<div id="hasil"></div>

<div class="small">
Mode aktif: Kamera • Upload QR • Manual
</div>

<iframe id="hiddenFrame" style="display:none;"></iframe>

<script>

const WEBAPP = "https://script.google.com/macros/s/AKfycbxIwplhxtw_a0rq89s__PxdFSCIVQBEfHvR4amXyTTvY9-XEJmpc-pcJeALOGk_FzeKNg/exec";

let sedangProses = false;
let lastScan = "";

function bunyi(){
new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

function tampil(msg,sukses=false){
const h = document.getElementById("hasil");
h.innerHTML = msg;
h.style.color = sukses ? "green" : "red";
if(sukses) bunyi();
}

function resetProses(){
setTimeout(()=>{
sedangProses = false;
tampil("");
},3000);
}

function kirimKode(kode){

if(!kode) return;
kode = kode.trim();

if(kode=="") return;

if(sedangProses) return;

if(lastScan === kode){
return;
}

sedangProses = true;
lastScan = kode;

document.getElementById("btnManual").disabled = true;

tampil("⏳ Diproses...",true);

const url = WEBAPP + "?kode=" + encodeURIComponent(kode);

document.getElementById("hiddenFrame").src = url + "&t=" + new Date().getTime();

setTimeout(()=>{
tampil("✅ Check-in diproses",true);
document.getElementById("manual").value = "";
document.getElementById("manual").focus();
document.getElementById("btnManual").disabled = false;
resetProses();
},1200);

setTimeout(()=>{
lastScan = "";
},4000);

}

function manualCheckin(){
const kode = document.getElementById("manual").value;
kirimKode(kode);
}

function onScanSuccess(decodedText){
kirimKode(decodedText);
}

new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250,
rememberLastUsedCamera:true
}
).render(onScanSuccess);

document.getElementById("file").addEventListener("change",function(e){

const file = e.target.files[0];
if(!file) return;

Html5Qrcode.scanFile(file,true)
.then(decodedText=>{
kirimKode(decodedText);
})
.catch(()=>{
tampil("❌ QR gambar gagal dibaca");
resetProses();
});

this.value="";

});

document.getElementById("manual").addEventListener("keypress",function(e){
if(e.key==="Enter"){
manualCheckin();
}
});

</script>

</body>
</html>
